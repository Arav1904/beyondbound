<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Page Moved - Beyond Bound</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(
          circle at top,
          #1d2736 0%,
          #0f141c 52%,
          #0a0e14 100%
        );
        color: #ebf2ff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 560px;
        background: rgba(18, 25, 35, 0.92);
        border: 1px solid rgba(132, 163, 201, 0.35);
        border-radius: 18px;
        padding: 34px;
        box-shadow: 0 18px 52px rgba(0, 0, 0, 0.38);
      }
      h1 {
        font-size: 1.6rem;
        margin-bottom: 10px;
        letter-spacing: 0.02em;
      }
      p {
        color: #b8c7df;
        line-height: 1.55;
        margin-bottom: 16px;
      }
      a.button {
        display: inline-block;
        margin-top: 8px;
        background: #8fb6ff;
        color: #102034;
        text-decoration: none;
        font-weight: 700;
        padding: 12px 18px;
        border-radius: 10px;
      }
      .hint {
        margin-top: 14px;
        font-size: 0.92rem;
        color: #93a8c5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Order page moved</h1>
      <p>
        This legacy page is no longer used. Orders now run through the
        signed-in in-app checkout so product selection always maps to the live
        catalog.
      </p>
      <a class="button" href="/">Open Beyond Bound app</a>
      <p class="hint">
        Sign in, choose your product, then complete checkout from the app.
      </p>
    </div>
  </body>
</html>
